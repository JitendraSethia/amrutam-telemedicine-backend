global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: amrutam-api
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8080']
        labels:
          service: amrutam-telemedicine
          component: api

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
