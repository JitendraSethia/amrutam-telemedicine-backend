# Local, one-command stack:  docker compose up --build
# Seed sample data:          docker compose --profile seed run --rm seed
#
# UIs:  API/docs http://localhost:8080/docs · Jaeger http://localhost:16686
#       Prometheus http://localhost:9090 · Grafana http://localhost:3001 (admin/admin)
name: amrutam

x-app-env: &app-env
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: "8080"
  LOG_LEVEL: info
  DATABASE_URL: postgres://amrutam:amrutam@postgres:5432/amrutam
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_SECRET: dev-access-secret-change-me-in-prod-0001
  JWT_REFRESH_SECRET: dev-refresh-secret-change-me-in-prod-002
  DATA_ENCRYPTION_KEYS: "v1:7nlGbE7zD/AEH4/2buLcicBr0O32tHqnD7q9vyz9d5o=,v2:ybErx+ptQ8xJWvOA/OCaywo983OCRYcIXBflDE0AIlQ="
  DATA_ENCRYPTION_ACTIVE_KID: v2
  PAYMENT_WEBHOOK_SECRET: dev-webhook-secret
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_SERVICE_NAME: amrutam-telemedicine
  CORS_ORIGINS: "*"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: amrutam
      POSTGRES_PASSWORD: amrutam
      POSTGRES_DB: amrutam
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amrutam"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: { context: ., target: runner }
    command: ["npm", "run", "migrate:up"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  app:
    build: { context: ., target: runner }
    environment: *app-env
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  worker:
    build: { context: ., target: runner }
    command: ["node", "dist/jobs/worker.js"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  # One-off: apply migrations + seed sample data (dev image with tsx).
  seed:
    build: { context: ., target: builder }
    command: ["sh", "-c", "npm run migrate:up && npm run seed"]
    environment: *app-env
    depends_on:
      postgres: { condition: service_healthy }
    profiles: ["seed"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports: ["4318:4318"]
    depends_on: [jaeger]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports: ["16686:16686"]

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3001:3000"]
    depends_on: [prometheus]

volumes:
  pgdata:
  redisdata:
